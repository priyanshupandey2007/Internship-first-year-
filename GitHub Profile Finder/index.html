<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GitHub Profile Finder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h2>Find a GitHub User</h2>
        <form id="form">
            <input type="text" id="search" placeholder="Enter a GitHub username..." autocomplete="off">
            <button type="submit">Search</button>
        </form>
        
        <!-- This is where our JavaScript will inject the profile card -->
        <div id="profile-container"></div>
    </main>
    <script src="script.js"></script>
</body>
</html>
