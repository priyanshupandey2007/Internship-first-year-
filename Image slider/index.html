<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Image Slider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="slider-container" id="slider-container">
        <div class="slide active">
            <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80" alt="Nature 1">
        </div>
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=800&q=80" alt="Nature 2">
        </div>
        <div class="slide">
            <img src="https://images.unsplash.com/photo-1472214222541-d510753a8707?auto=format&fit=crop&w=800&q=80" alt="Nature 3">
        </div>

        <button class="arrow left-arrow" id="left">‹</button>
        <button class="arrow right-arrow" id="right">›</button>

        <div class="indicators-container" id="indicators"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
