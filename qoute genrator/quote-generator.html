<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Wisdom - Random Quote Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Background accents */
        body::before {
            content: '';
            position: absolute;
            top: 80px;
            right: 80px;
            width: 288px;
            height: 288px;
            background: rgba(251, 146, 60, 0.1);
            border-radius: 50%;
            filter: blur(96px);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            bottom: 80px;
            left: 80px;
            width: 288px;
            height: 288px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            filter: blur(96px);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 800px;
            position: relative;
            z-index: 10;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            color: #fef3c7;
            margin-bottom: 8px;
            font-family: Georgia, serif;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.875rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2rem;
            }
        }

        /* Quote Card */
        .quote-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 48px 48px;
            margin-bottom: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            min-height: 320px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .quote-card:hover {
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* Loading spinner */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(251, 146, 60, 0.2);
            border-top-color: #f59e0b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Error state */
        .error-message {
            color: #fca5a5;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 1.125rem;
        }

        /* Quote content */
        .quote-content {
            margin-bottom: 24px;
        }

        .quote-mark {
            font-size: 3rem;
            color: #f59e0b;
            line-height: 1;
            margin-bottom: 16px;
        }

        .quote-text {
            font-size: 1.875rem;
            color: #fef3c7;
            font-family: Georgia, serif;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .quote-card {
                padding: 32px 24px;
            }

            .quote-text {
                font-size: 1.5rem;
            }
        }

        /* Author */
        .quote-author {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 24px;
            color: #cbd5e1;
            font-size: 1.125rem;
            font-weight: 500;
        }

        /* Buttons section */
        .buttons-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        @media (max-width: 640px) {
            .button-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Button styles */
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.95);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(to right, #f59e0b, #d97706);
            color: white;
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.3);
        }

        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(to right, #d97706, #b45309);
            box-shadow: 0 12px 30px rgba(245, 158, 11, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
        }

        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.5);
        }

        .btn-secondary.copied {
            background: rgba(74, 222, 128, 0.2);
            border-color: rgba(74, 222, 128, 0.5);
            color: #86efac;
        }



        /* Footer */
        .footer {
            text-align: center;
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 32px;
        }

        /* SVG icons */
        svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }



        /* Hidden elements */
        .hidden {
            display: none;
        }

        /* Fade in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quote-card.loaded {
            animation: fadeIn 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Daily Wisdom</h1>
            <p>Discover Inspiring Quotes</p>
        </div>

        <!-- Quote Card -->
        <div class="quote-card">
            <div id="quote-content" class="quote-content">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
            <div id="quote-author" class="quote-author" style="display: none;"></div>
        </div>

        <!-- Action Buttons -->
        <div class="buttons-section">
            <!-- Primary buttons -->
            <div class="button-grid">
                <button id="btn-new-quote" class="btn-primary" onclick="fetchQuote()">
                    <span>🎲</span>
                    New Quote
                </button>
                <button id="btn-copy" class="btn-secondary" onclick="copyQuote()">
                    <span>📋</span>
                    <span id="copy-text">Copy Quote</span>
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Powered by Anthropic API
        </div>
    </div>

    <script>
        // Mock quotes for local development (fallback)
        const mockQuotes = [
            { quote: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
            { quote: "Innovation distinguishes between a leader and a follower.", author: "Steve Jobs" },
            { quote: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
            { quote: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
            { quote: "It is during our darkest moments that we must focus to see the light.", author: "Aristotle" },
            { quote: "The way to get started is to quit talking and begin doing.", author: "Walt Disney" },
            { quote: "Don't let yesterday take up too much of today.", author: "Will Rogers" },
            { quote: "You learn more from failure than from success.", author: "Unknown" },
            { quote: "It's not whether you get knocked down, it's whether you get up.", author: "Vince Lombardi" },
            { quote: "Do something today that your future self will thank you for.", author: "Sean Patrick Flanery" },
            { quote: "Little things make big days.", author: "Unknown" },
            { quote: "It's going to be hard, but hard does not mean impossible.", author: "Unknown" },
            { quote: "Don't stop when you're tired. Stop when you're done.", author: "Unknown" },
            { quote: "Wake up with determination. Go to bed with satisfaction.", author: "Unknown" },
            { quote: "Do what you have to do, to do what you want to do.", author: "Oprah Winfrey" }
        ];

        // State variables
        let currentQuote = '';
        let currentAuthor = '';
        let isLoading = false;

        // Fetch quote from Anthropic API (with fallback to mock quotes)
        async function fetchQuote() {
            if (isLoading) return;

            isLoading = true;
            const quoteContent = document.getElementById('quote-content');
            const quoteAuthor = document.getElementById('quote-author');
            const btnNewQuote = document.getElementById('btn-new-quote');
            const btnCopy = document.getElementById('btn-copy');
            const copyText = document.getElementById('copy-text');

            // Show loading state
            quoteContent.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            quoteAuthor.style.display = 'none';
            btnNewQuote.disabled = true;
            btnCopy.disabled = true;

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-6',
                        max_tokens: 300,
                        messages: [
                            {
                                role: 'user',
                                content: 'Generate one inspiring, thought-provoking quote. Format ONLY as: [QUOTE TEXT]|[AUTHOR NAME] - nothing else, no markdown, no extra text, no quotes around the quote text.'
                            }
                        ]
                    })
                });

                if (!response.ok) {
                    throw new Error('API request failed');
                }

                const data = await response.json();
                const content = data.content?.[0]?.text || '';

                if (!content) {
                    throw new Error('Invalid response format');
                }

                // Parse the response format: [QUOTE]|[AUTHOR]
                const parts = content.split('|');
                if (parts.length !== 2) {
                    throw new Error('Invalid quote format');
                }

                currentQuote = parts[0].trim().replace(/^["']|["']$/g, '');
                currentAuthor = parts[1].trim();

                // Display quote
                displayQuote();

            } catch (err) {
                console.log('Using mock quote (API unavailable)');
                // Fallback: Use a random mock quote
                const randomIndex = Math.floor(Math.random() * mockQuotes.length);
                const mockQuote = mockQuotes[randomIndex];
                currentQuote = mockQuote.quote;
                currentAuthor = mockQuote.author;
                
                displayQuote();
            } finally {
                isLoading = false;
                btnNewQuote.disabled = false;
                btnCopy.disabled = currentQuote === '';
            }
        }

        // Display the current quote
        function displayQuote() {
            const quoteContent = document.getElementById('quote-content');
            const quoteAuthor = document.getElementById('quote-author');
            const copyText = document.getElementById('copy-text');

            quoteContent.innerHTML = `
                <div class="quote-mark">"</div>
                <div class="quote-text">${escapeHtml(currentQuote)}</div>
            `;
            quoteAuthor.innerHTML = `— ${escapeHtml(currentAuthor)}`;
            quoteAuthor.style.display = 'block';
            quoteContent.classList.add('loaded');

            // Reset copy button
            document.getElementById('btn-copy').classList.remove('copied');
            copyText.textContent = 'Copy Quote';
        }

        // Copy quote to clipboard
        async function copyQuote() {
            if (!currentQuote) return;

            const textToCopy = `"${currentQuote}" — ${currentAuthor}`;
            const btnCopy = document.getElementById('btn-copy');
            const copyText = document.getElementById('copy-text');

            try {
                await navigator.clipboard.writeText(textToCopy);
                
                // Show success feedback
                btnCopy.classList.add('copied');
                copyText.textContent = 'Copied!';

                // Reset after 2 seconds
                setTimeout(() => {
                    btnCopy.classList.remove('copied');
                    copyText.textContent = 'Copy Quote';
                }, 2000);
            } catch (err) {
                console.error('Failed to copy:', err);
                fallbackCopy(textToCopy);
            }
        }

        // Fallback copy method for older browsers
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, char => map[char]);
        }

        // Fetch quote on page load
        window.addEventListener('DOMContentLoaded', fetchQuote);
    </script>
</body>
</html>
