<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recipe Box — Find something worth cooking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500&family=Work+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <header>
    <span class="eyebrow">Recipe Box · No.001</span>
    <h1>Find something <em>worth</em> cooking.</h1>
    <p class="sub">Search a global recipe index for dishes, pull the ingredient ticket, and follow the numbered steps. Powered by TheMealDB.</p>
  </header>

  <div class="search-card">
    <div class="search-row">
      <div class="search-input-group">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Search a dish — “chicken curry”, “pancakes”, “tacos”…" autocomplete="off">
      </div>
      <select id="categorySelect">
        <option value="">All categories</option>
      </select>
      <button class="btn-primary" id="searchBtn">Search</button>
      <button class="btn-ghost" id="randomBtn">🎲 Surprise me</button>
    </div>
    <div class="tags-row" id="quickTags"></div>
  </div>

  <div class="status" id="status">
    <span class="dot"></span> <span id="statusText">Type a dish above, or hit “Surprise me” for a random pick.</span>
  </div>

  <div class="grid" id="grid"></div>
</div>

<footer>Recipe data courtesy of <a href="https://www.themealdb.com/" target="_blank" rel="noopener">TheMealDB</a> — a free, open recipe API.</footer>

<div class="overlay" id="overlay">
  <div class="detail" id="detailContent"></div>
</div>

<script src="script.js"></script>

</body>
</html>
